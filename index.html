<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腾讯校招新人封培 · 幸运抽奖</title>
<style>
/* ========== Reset & Variables ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#0052D9;--blue-l:#2B7BFF;--blue-light:#00A3FF;
  --dark:#0a0e27;--dark-mid:#111833;--dark-l:#1A1A2E;
  --card-bg:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.08);
  --gold:#FFD700;--gold-l:#FFA500;
  --green:#00E676;--red:#FF5252;
  --text:#FFFFFF;--text-m:#B0BEC5;--text-d:#78909C;
  --cw:160px;--ch:210px;
  --font:'PingFang SC','Segoe UI','Microsoft YaHei','Helvetica Neue',sans-serif;
}
html,body{width:100%;height:100%;font-family:var(--font);background:var(--dark);color:var(--text);overflow-x:hidden;user-select:none}
body{display:flex;flex-direction:column;min-height:100vh}

/* ========== Canvas Particles ========== */
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ========== Main Layout ========== */
#app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;width:100%}

/* ========== Top Bar ========== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(10,14,39,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;filter:brightness(1.2) drop-shadow(0 0 6px rgba(43,123,255,0.3))}
.topbar-logo svg{width:100%;height:100%}
.topbar-title{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--blue-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.topbar-right{display:flex;gap:12px;align-items:center}
.topbar-btn{background:var(--glass);border:1px solid rgba(255,255,255,0.1);color:var(--text-m);padding:8px 16px;border-radius:10px;cursor:pointer;font-size:0.85rem;font-family:var(--font);transition:all .3s;display:flex;align-items:center;gap:6px}
.topbar-btn:hover{background:rgba(255,255,255,0.14);color:#fff;border-color:rgba(255,255,255,0.2);transform:translateY(-1px)}
.topbar-btn svg{width:16px;height:16px;fill:currentColor}

/* ========== Stats Bar ========== */
.stats-bar{display:flex;justify-content:center;gap:60px;padding:20px 32px;animation:fadeIn .8s ease-out}
.stat-item{text-align:center}
.stat-num{font-size:2.4rem;font-weight:800;color:var(--blue-l);line-height:1.1}
.stat-num.gold{color:var(--gold)}
.stat-label{font-size:0.8rem;color:var(--text-d);margin-top:4px;letter-spacing:1px}

/* ========== Main Content ========== */
.main-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 32px}

/* ========== Lottery Control ========== */
.lottery-control{display:flex;align-items:center;gap:20px;margin-bottom:32px;animation:fadeInU .6s ease-out}
.lottery-input{width:120px;height:64px;background:rgba(0,0,0,0.4);border:2px solid var(--blue);border-radius:16px;font-size:2rem;font-weight:800;color:var(--gold);text-align:center;font-family:var(--font);outline:none;transition:all .3s;-moz-appearance:textfield}
.lottery-input::-webkit-outer-spin-button,.lottery-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.lottery-input:focus{border-color:var(--blue-l);box-shadow:0 0 24px rgba(0,82,217,0.4);background:rgba(0,0,0,0.5)}
.lottery-input::placeholder{color:rgba(255,215,0,0.3);font-size:1.2rem;font-weight:400}
.input-hint{color:var(--text-d);font-size:0.9rem;margin-right:-8px}

.btn{padding:14px 40px;border:none;border-radius:50px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:2px;font-family:var(--font);position:relative;overflow:hidden}
.btn:active{transform:scale(0.97)}
.btn-go{background:linear-gradient(135deg,var(--blue),var(--blue-l));color:#fff;box-shadow:0 4px 24px rgba(0,82,217,0.4);font-size:1.3rem;padding:16px 52px}
.btn-go:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 40px rgba(0,82,217,0.55)}
.btn-go:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-next{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#1a1a2e;box-shadow:0 4px 20px rgba(255,215,0,0.3);font-size:1.1rem;padding:14px 44px;display:none}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,215,0,0.5)}
.btn-reset{background:var(--glass);border:1px solid rgba(255,255,255,0.12);color:var(--text-m);padding:10px 24px;border-radius:12px;font-size:0.85rem;display:none;margin-top:12px}
.btn-reset:hover{background:rgba(255,255,255,0.15);color:#fff}

/* ========== Quick Pick Buttons ========== */
.quick-picks{display:flex;gap:8px;margin-left:4px}
.quick-btn{width:44px;height:44px;border-radius:12px;border:1.5px solid rgba(43,123,255,0.35);background:rgba(43,123,255,0.12);color:var(--blue-l);font-size:1rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .25s;display:flex;align-items:center;justify-content:center}
.quick-btn:hover{background:rgba(43,123,255,0.3);border-color:var(--blue-l);color:#fff;transform:translateY(-2px);box-shadow:0 4px 16px rgba(43,123,255,0.3)}
.quick-btn:active{transform:scale(0.95)}
.quick-btn.active{background:var(--blue);border-color:var(--blue-l);color:#fff;box-shadow:0 0 12px rgba(43,123,255,0.4)}
.fullscreen-mode .quick-btn{width:56px;height:56px;font-size:1.3rem;border-radius:16px}

/* ========== Export Button ========== */
.export-bar{display:flex;gap:10px;justify-content:flex-end;margin-bottom:12px}
.export-btn{background:var(--glass);border:1px solid rgba(255,255,255,0.1);color:var(--text-m);padding:8px 18px;border-radius:10px;cursor:pointer;font-size:0.82rem;font-family:var(--font);transition:all .3s;display:flex;align-items:center;gap:6px}
.export-btn:hover{background:rgba(255,255,255,0.14);color:#fff;border-color:rgba(255,255,255,0.2);transform:translateY(-1px)}
.export-btn svg{width:14px;height:14px;fill:currentColor}
.export-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);background:rgba(0,0,0,0.85);color:#fff;padding:14px 28px;border-radius:12px;font-size:0.95rem;font-weight:600;z-index:10000;opacity:0;transition:all .3s ease;pointer-events:none;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1)}
.export-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ========== Interaction Lock Overlay ========== */
.draw-lock{pointer-events:none;opacity:0.5;transition:opacity .3s}
.lottery-control.locked .lottery-input,.lottery-control.locked .quick-btn,.lottery-control.locked .btn-go{pointer-events:none;opacity:0.4}

/* ========== Cards Area ========== */
.cards-area{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin:20px 0;perspective:1200px;min-height:100px}

/* ========== Card ========== */
.card{width:var(--cw);height:var(--ch);position:relative;transform-style:preserve-3d;cursor:default;animation:cardEnter .5s ease-out both}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.175,0.885,0.32,1.275);border-radius:16px}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

/* Front - Penguin */
.card-front{background:linear-gradient(160deg,#0d1b3e,#162855,#0d1b3e);border:2px solid rgba(43,123,255,0.3);box-shadow:0 4px 20px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.08)}
.card-front .penguin-svg{width:80px;height:80px;filter:drop-shadow(0 4px 12px rgba(43,123,255,0.5)) brightness(1.3);margin-bottom:8px}
.card-front .card-q{font-size:2.2rem;font-weight:800;color:rgba(255,255,255,0.4);animation:pulse 2s ease-in-out infinite}

/* Back - Winner */
.card-back{transform:rotateY(180deg);background:linear-gradient(160deg,#111833,#1a2248);border:2px solid rgba(255,215,0,0.3);box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 20px rgba(255,215,0,0.1)}
.card.flipped .card-back{box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 30px rgba(255,215,0,0.2)}
.card-back .winner-name{font-size:1.8rem;font-weight:800;color:var(--gold);margin-bottom:2px;text-shadow:0 0 12px rgba(255,215,0,0.3);letter-spacing:3px;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-sizing:border-box}
.card-back .winner-name.long-name{font-size:1.35rem;letter-spacing:1px}
.card-back .winner-ename{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:1px;text-shadow:0 0 8px rgba(255,215,0,0.3)}
.card-back .winner-class{display:inline-block;padding:4px 14px;background:linear-gradient(135deg,var(--blue),var(--blue-l));border-radius:20px;font-size:0.75rem;color:#fff;font-weight:600;letter-spacing:1px}

/* Card animations */
.card.wiggle .card-inner{animation:wiggle .15s ease-in-out infinite alternate}
.card.flipped .card-front{opacity:0}
.card.celebrating{animation:celebrate .6s ease-out}

/* ========== Slot Machine Rolling ========== */
.card-front .slot-name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.6rem;font-weight:800;color:rgba(43,123,255,0.9);text-shadow:0 0 12px rgba(43,123,255,0.5);letter-spacing:2px;opacity:0;transition:opacity .15s;white-space:nowrap;pointer-events:none;z-index:2}
.card.slot-rolling .card-front .slot-name{opacity:1}
.card.slot-rolling .card-front .penguin-svg{opacity:0.15;transition:opacity .3s}
.card.slot-rolling .card-front .card-q{opacity:0;transition:opacity .3s}
.card.slot-settled .card-front .slot-name{color:var(--gold);text-shadow:0 0 16px rgba(255,215,0,0.6);font-size:1.8rem;transition:all .3s}
.fullscreen-mode .card-front .slot-name{font-size:1.9rem}
.fullscreen-mode .card.slot-settled .card-front .slot-name{font-size:2.1rem}

/* ========== Gold Edge Glow (Subtle Border Halo) ========== */
.card.halo-active .card-inner{border:2px solid rgba(255,215,0,0.5);box-shadow:0 0 12px rgba(255,215,0,0.2),0 0 4px rgba(255,215,0,0.15),inset 0 0 8px rgba(255,215,0,0.05);animation:edgeGlow 2.5s ease-in-out infinite}

@keyframes edgeGlow{0%,100%{border-color:rgba(255,215,0,0.4);box-shadow:0 0 10px rgba(255,215,0,0.15),0 0 4px rgba(255,215,0,0.1)}50%{border-color:rgba(255,215,0,0.7);box-shadow:0 0 18px rgba(255,215,0,0.3),0 0 6px rgba(255,215,0,0.2)}}

@keyframes cardEnter{from{opacity:0;transform:scale(0.5) rotateZ(10deg)}to{opacity:1;transform:scale(1) rotateZ(0)}}
@keyframes wiggle{from{transform:rotateZ(-3deg) rotateY(-5deg)}to{transform:rotateZ(3deg) rotateY(5deg)}}
@keyframes celebrate{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}
@keyframes glow{0%,100%{box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 20px rgba(255,215,0,0.15)}50%{box-shadow:0 4px 24px rgba(0,0,0,0.4),0 0 40px rgba(255,215,0,0.35)}}

/* ========== History & Stats Section ========== */
.bottom-section{width:100%;max-width:1200px;margin:0 auto;padding:20px 32px 40px}
.section-title{font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:20px;background:linear-gradient(var(--blue),var(--blue-l));border-radius:2px}

/* History */
.history-area{margin-bottom:32px}
.history-empty{color:var(--text-d);font-size:0.9rem;padding:16px;text-align:center}
.history-rounds{display:flex;flex-direction:column;gap:12px}
.history-round{background:var(--glass);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px 20px;backdrop-filter:blur(8px)}
.round-header{font-size:0.9rem;font-weight:700;color:var(--blue-l);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.round-header .round-count{background:var(--blue);color:#fff;padding:2px 10px;border-radius:10px;font-size:0.75rem;font-weight:600}
.round-winners{display:flex;flex-wrap:wrap;gap:8px}
.winner-tag{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(0,82,217,0.3),rgba(43,123,255,0.2));border:1px solid rgba(43,123,255,0.25);padding:6px 14px;border-radius:20px;font-size:0.82rem;font-weight:600;color:#fff;letter-spacing:0.5px}
.winner-tag .tag-ename{font-size:0.75rem;color:var(--gold);font-weight:500;font-style:italic}
.winner-tag .tag-class{font-size:0.72rem;color:var(--text-m);font-weight:400}

/* Stats */
.stats-section{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.stat-card{background:var(--glass);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px;backdrop-filter:blur(8px)}
.stat-card-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-card-title .trophy{font-size:1.1rem}
.stat-empty{color:var(--text-d);font-size:0.85rem;text-align:center;padding:12px}
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.stat-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;flex-shrink:0}
.stat-rank.r1{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#1a1a2e}
.stat-rank.r2{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#1a1a2e}
.stat-rank.r3{background:linear-gradient(135deg,#CD7F32,#B8722C);color:#fff}
.stat-rank.rn{background:rgba(255,255,255,0.1);color:var(--text-d)}
.stat-name{width:90px;font-size:0.85rem;font-weight:600;color:var(--text);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-bar-wrap{flex:1;height:24px;background:rgba(255,255,255,0.06);border-radius:12px;overflow:hidden;position:relative}
.stat-bar{height:100%;border-radius:12px;transition:width .8s cubic-bezier(0.25,0.46,0.45,0.94);min-width:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.stat-bar.blue{background:linear-gradient(90deg,var(--blue),var(--blue-l))}
.stat-bar.gold{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.stat-bar-num{font-size:0.72rem;font-weight:700;color:#fff;white-space:nowrap}
.stat-count{width:40px;text-align:right;font-size:0.85rem;font-weight:700;color:var(--blue-l);flex-shrink:0}

/* ========== Confetti ========== */
.confetti{position:fixed;top:-10px;width:10px;height:10px;z-index:1000;pointer-events:none;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotateZ(0deg) rotateX(0deg);opacity:1}70%{opacity:1}100%{transform:translateY(100vh) rotateZ(720deg) rotateX(360deg);opacity:0}}

/* ========== Footer ========== */
.footer{text-align:center;padding:20px;color:var(--text-d);font-size:0.75rem;letter-spacing:1px}

/* ========== Animations ========== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInU{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInD{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* ========== Fullscreen Adjustments ========== */
.fullscreen-mode .topbar-title{font-size:2rem}
.fullscreen-mode .stat-num{font-size:3.2rem}
.fullscreen-mode .stat-label{font-size:1rem}
.fullscreen-mode .lottery-input{width:160px;height:80px;font-size:2.8rem;border-radius:20px}
.fullscreen-mode .btn-go{font-size:1.6rem;padding:20px 64px}
.fullscreen-mode .card{--cw:180px;--ch:240px;width:var(--cw);height:var(--ch)}
.fullscreen-mode .card-back .winner-name{font-size:2.4rem}
.fullscreen-mode .card-back .winner-name.long-name{font-size:1.6rem;letter-spacing:1px}
.fullscreen-mode .card-back .winner-ename{font-size:1.3rem}
.fullscreen-mode .card-back .winner-class{font-size:0.9rem;padding:6px 18px}
.fullscreen-mode .section-title{font-size:1.6rem}
.fullscreen-mode .winner-tag{font-size:1rem;padding:8px 18px}

/* ========== Responsive ========== */
@media(max-width:768px){
  .stats-bar{gap:30px}
  .stat-num{font-size:1.8rem}
  .stats-section{grid-template-columns:1fr}
  .lottery-control{flex-wrap:wrap;justify-content:center}
}
@media(min-width:1600px){
  .card{--cw:180px;--ch:230px;width:var(--cw);height:var(--ch)}
  .card-back .winner-name{font-size:2rem}
  .card-back .winner-name.long-name{font-size:1.45rem;letter-spacing:1px}
  .card-back .winner-ename{font-size:1.15rem}
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.25)}

/* ========== Audio button ========== */
.sound-on .sound-icon-off{display:none}
.sound-off .sound-icon-on{display:none}
.sound-on .sound-icon-on{display:inline}
.sound-off .sound-icon-off{display:inline}
</style>
</head>

// ==================== BG PARSER ====================
// 从班级字段解析出 BG 名称
// 格式如："CSIG3班" → "CSIG"，"S12班" → "S"，"Overseas3班" → "Overseas"
function parseBG(className) {
  const m = className.match(/^(.+?)(\d+)班$/);
  if (m) return m[1].trim();
  return '未知';
}

// 从班级字段解析出 "x班" 部分
// 格式如："CDG1班" → "1班"，"S12班" → "12班"，"Overseas3班" → "3班"
function parseClassNum(className) {
  const m = className.match(/(\d+班)$/);
  if (m) return m[1];
  return className;
}

// 格式化卡片显示："CDG1班" → "1班 - CDG"
function formatCardDisplay(className) {
  return parseClassNum(className) + ' - ' + parseBG(className);
}

// ==================== STATE ====================
let candidates = [...ALL_DATA]; // 剩余候选人
let history = []; // [{round, winners}]
let roundNum = 0;
let isDrawing = false;
let soundEnabled = true;

// Stats maps
let classWinCount = {}; // { className: count }
let bgWinCount = {};    // { bgName: count }

// ==================== INIT ====================
function init() {
  updateStats();
  setupParticles();
  setupKeyboard();
  document.getElementById('drawNum').focus();
}

function updateStats() {
  document.getElementById('totalCount').textContent = ALL_DATA.length;
  document.getElementById('remainCount').textContent = candidates.length;
  document.getElementById('drawnCount').textContent = ALL_DATA.length - candidates.length;
}

function setupKeyboard() {
  document.getElementById('drawNum').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !isDrawing) startDraw();
  });
  // Space bar as shortcut to start draw or next round
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
      e.preventDefault();
      if (isDrawing) return;
      const nextBtn = document.getElementById('nextBtn');
      if (nextBtn.style.display !== 'none') { nextRound(); return; }
      startDraw();
    }
  });
}

// ==================== QUICK PICK ====================
function quickPick(n, btn) {
  if (isDrawing) return;
  const input = document.getElementById('drawNum');
  input.value = n;
  // Highlight active quick button
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ==================== INTERACTION LOCK ====================
function lockInteraction() {
  document.getElementById('lotteryControl').classList.add('locked');
  document.getElementById('goBtn').disabled = true;
  document.querySelectorAll('.quick-btn').forEach(b => b.disabled = true);
  document.getElementById('drawNum').disabled = true;
}

function unlockInteraction() {
  document.getElementById('lotteryControl').classList.remove('locked');
  document.getElementById('goBtn').disabled = false;
  document.querySelectorAll('.quick-btn').forEach(b => b.disabled = false);
  document.getElementById('drawNum').disabled = false;
  if (candidates.length === 0) {
    document.getElementById('goBtn').disabled = true;
    document.getElementById('goBtn').textContent = '已全部抽完';
  }
}

// ==================== DRAW LOGIC ====================
function startDraw() {
  if (isDrawing) return;
  const input = document.getElementById('drawNum');
  let n = parseInt(input.value);
  if (!n || n <= 0) { shakeInput(); return; }
  if (candidates.length === 0) {
    document.getElementById('goBtn').disabled = true;
    document.getElementById('goBtn').textContent = '已全部抽完';
    return;
  }
  if (n > candidates.length) {
    n = candidates.length;
    input.value = n;
    // Brief visual hint that number was capped
    input.style.borderColor = 'var(--gold)';
    setTimeout(() => { input.style.borderColor = ''; }, 1000);
  }

  isDrawing = true;
  lockInteraction();
  roundNum++;

  // Fisher-Yates shuffle
  const pool = [...candidates];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const winners = pool.slice(0, n);

  // Remove winners from candidates
  const winnerIds = new Set(winners.map(w => w.id));
  candidates = candidates.filter(c => !winnerIds.has(c.id));

  // Update stats maps
  winners.forEach(w => {
    const classNum = parseClassNum(w.className);
    classWinCount[classNum] = (classWinCount[classNum] || 0) + 1;
    const bg = parseBG(w.className);
    bgWinCount[bg] = (bgWinCount[bg] || 0) + 1;
  });

  // Save history
  history.push({ round: roundNum, winners: [...winners] });

  // Hide control, show cards
  document.getElementById('lotteryControl').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';

  // Generate cards
  generateCards(winners);

  // Animate: wiggle + slot machine roll, then flip
  const slotDuration = 1800 + winners.length * 300 + 500; // total slot rolling time
  setTimeout(() => startWiggle(), 300);
  setTimeout(() => startSlotRoll(winners), 600);
  setTimeout(() => flipCards(winners), slotDuration + 800);

  updateStats();
}

function shakeInput() {
  const input = document.getElementById('drawNum');
  input.style.animation = 'none';
  input.offsetHeight; // reflow
  input.style.animation = 'shake .4s ease-in-out';
  setTimeout(() => { input.style.animation = ''; }, 400);
  // Add shake keyframe dynamically
  if (!document.getElementById('shake-style')) {
    const s = document.createElement('style');
    s.id = 'shake-style';
    s.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}';
    document.head.appendChild(s);
  }
}

// ==================== SLOT MACHINE ROLL ====================
let slotTimers = []; // track interval IDs so we can clean up

function startSlotRoll(winners) {
  slotTimers.forEach(t => clearInterval(t));
  slotTimers = [];
  const cards = document.querySelectorAll('.card');
  const allNames = ALL_DATA.map(d => d.name);

  cards.forEach((card, idx) => {
    card.classList.add('slot-rolling');
    const slotEl = card.querySelector('.slot-name');
    // Each card rolls through random names
    let speed = 60; // start fast (ms per name change)
    let elapsed = 0;
    const totalDuration = 1800 + idx * 300; // stagger: later cards roll longer
    const targetName = winners[idx].name;

    function tick() {
      // Pick a random name (not the actual winner most of the time)
      const randomName = allNames[Math.floor(Math.random() * allNames.length)];
      slotEl.textContent = randomName;
    }

    // Phase 1: fast rolling
    const intervalId = setInterval(() => {
      elapsed += speed;
      if (elapsed >= totalDuration - 400) {
        // Phase 2: settle on the winner name
        clearInterval(intervalId);
        slotEl.textContent = targetName;
        card.classList.add('slot-settled');
        card.classList.remove('wiggle');
      } else if (elapsed >= totalDuration * 0.6) {
        // Slow down phase
        tick();
      } else {
        tick();
      }
    }, speed);

    slotTimers.push(intervalId);

    // Gradually slow down using recursive setTimeout approach for natural deceleration
    let slowPhaseStart = totalDuration * 0.55;
    let currentDelay = speed;
    function slowRoll() {
      if (elapsed >= totalDuration - 400) return;
      if (elapsed >= slowPhaseStart) {
        currentDelay = Math.min(300, currentDelay * 1.15);
      }
      const randomName = allNames[Math.floor(Math.random() * allNames.length)];
      slotEl.textContent = randomName;
      const timerId = setTimeout(slowRoll, currentDelay);
      slotTimers.push(timerId);
    }
    // Start slow roll after 55% of duration
    const slowStartTimer = setTimeout(() => {
      clearInterval(intervalId);
      slowRoll();
      // Final settle
      const settleTimer = setTimeout(() => {
        slotEl.textContent = targetName;
        card.classList.add('slot-settled');
        card.classList.remove('wiggle');
      }, totalDuration - slowPhaseStart - 200);
      slotTimers.push(settleTimer);
    }, slowPhaseStart);
    slotTimers.push(slowStartTimer);
  });
}

function flipCards(winners) {
  const cards = document.querySelectorAll('.card');
  // Clean up slot rolling classes
  cards.forEach(c => {
    c.classList.remove('wiggle');
    c.classList.remove('slot-rolling');
    c.classList.remove('slot-settled');
  });
  slotTimers.forEach(t => { clearInterval(t); clearTimeout(t); });
  slotTimers = [];

  let delay = 0;
  const n = cards.length;
  cards.forEach((card, i) => {
    // Suspense timing: fast start, dramatic slowdown for final cards
    let interval;
    if (n <= 2) {
      interval = 800;
    } else if (n <= 3) {
      interval = 600 + i * 200;
    } else {
      const progress = i / (n - 1);
      if (progress < 0.5) interval = 350;
      else if (progress < 0.8) interval = 350 + (progress - 0.5) * 1200;
      else interval = 700 + (progress - 0.8) * 2500; // Last 20% much slower for suspense
    }

    setTimeout(() => {
      card.classList.add('flipped');
      if (soundEnabled) playFlip();

      // Add subtle gold edge glow after flip completes
      setTimeout(() => {
        card.classList.add('halo-active');
      }, 400);

      // Celebrate effect on last card
      if (i === n - 1) {
        setTimeout(() => {
          cards.forEach(c => c.classList.add('celebrating'));
          launchConfetti();
          if (soundEnabled) playWin();
          showNextButton();
          isDrawing = false;
          unlockInteraction();
        }, 700);
      }
    }, delay);
    delay += interval;
  });
}

// ==================== RENDER HISTORY ====================
function renderHistory() {
  const container = document.getElementById('historyContent');
  if (history.length === 0) {
    container.innerHTML = '<div class="history-empty">暂无抽奖记录</div>';
    document.getElementById('exportBar').style.display = 'none';
    return;
  }
  document.getElementById('exportBar').style.display = 'flex';
  let html = '<div class="history-rounds">';
  // Reverse order (newest first)
  for (let i = history.length - 1; i >= 0; i--) {
    const round = history[i];
    html += `<div class="history-round" style="animation:fadeInU .4s ease-out both;animation-delay:${(history.length-1-i)*0.05}s">
      <div class="round-header">第 ${round.round} 轮 <span class="round-count">${round.winners.length} 人</span></div>
      <div class="round-winners">`;
    round.winners.forEach(w => {
      html += `<span class="winner-tag">${w.name} <span class="tag-ename">${w.id}</span> <span class="tag-class">${formatCardDisplay(w.className)}</span></span>`;
    });
    html += '</div></div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderStatCard(containerId, dataMap, barColor) {
  const container = document.getElementById(containerId);
  const entries = Object.entries(dataMap).sort((a, b) => b[1] - a[1]);
  if (entries.length === 0) {
    container.innerHTML = '<div class="stat-empty">暂无数据</div>';
    return;
  }
  const maxCount = entries[0][1];
  let html = '';
  entries.forEach(([name, count], i) => {
    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
    const pct = Math.max(10, (count / maxCount) * 100);
    let displayName = name;
    html += `<div class="stat-row" style="animation:fadeIn .5s ease-out both;animation-delay:${i*0.08}s">
      <div class="stat-rank ${rankClass}">${i + 1}</div>
      <div class="stat-name" title="${displayName}">${displayName}</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar ${barColor}" style="width:${pct}%">
          <span class="stat-bar-num">${count}人</span>
        </div>
      </div>
      <div class="stat-count">${count}</div>
    </div>`;
  });
  container.innerHTML = html;
}

// ==================== EXPORT ====================
function buildExportText() {
  if (history.length === 0) return '';
  let lines = ['腾讯校招新人封培 · 抽奖记录', '═'.repeat(30), ''];
  const now = new Date();
  lines.push('导出时间：' + now.toLocaleString('zh-CN'));
  lines.push('总人数：' + ALL_DATA.length + '  已抽中：' + (ALL_DATA.length - candidates.length) + '  剩余：' + candidates.length);
  lines.push('');
  history.forEach(round => {
    lines.push('── 第 ' + round.round + ' 轮（' + round.winners.length + ' 人）──');
    round.winners.forEach((w, i) => {
      lines.push('  ' + (i+1) + '. ' + w.name + '（' + w.id + '）— ' + formatCardDisplay(w.className));
    });
    lines.push('');
  });
  // Stats summary
  const classEntries = Object.entries(classWinCount).sort((a,b) => b[1]-a[1]);
  const bgEntries = Object.entries(bgWinCount).sort((a,b) => b[1]-a[1]);
  if (classEntries.length > 0) {
    lines.push('── 班级运气榜 ──');
    classEntries.forEach(([name, count], i) => {
      lines.push('  ' + (i+1) + '. ' + name + '：' + count + ' 人');
    });
    lines.push('');
  }
  if (bgEntries.length > 0) {
    lines.push('── BG 运气榜 ──');
    bgEntries.forEach(([name, count], i) => {
      lines.push('  ' + (i+1) + '. ' + name + '：' + count + ' 人');
    });
    lines.push('');
  }
  lines.push('═'.repeat(30));
  return lines.join('\n');
}

function showToast(msg) {
  let toast = document.getElementById('exportToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'exportToast';
    toast.className = 'export-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function exportCopy() {
  const text = buildExportText();
  if (!text) { showToast('暂无记录可导出'); return; }
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ 已复制到剪贴板');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 已复制到剪贴板');
  });
}

function exportDownload() {
  const text = buildExportText();
  if (!text) { showToast('暂无记录可导出'); return; }
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const dateStr = now.getFullYear() + '' + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
  a.download = '封培抽奖记录_' + dateStr + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ 文件已下载');
}

  const shapes = ['circle','rect'];

// ==================== SOUND ====================
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTick() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

function playFlip() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 600 + Math.random() * 400;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playWin() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  } catch(e) {}
}

// ==================== PARTICLES (Canvas) ====================
function setupParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Create particles
  const count = 80;
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      r: 1.5 + Math.random() * 2,
      alpha: 0.3 + Math.random() * 0.5
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);

    // Draw connections
    for (let i = 0; i < count; i++) {
      for (let j = i + 1; j < count; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(0,82,217,${0.12 * (1 - dist / 150)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // Draw particles
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(43,123,255,${p.alpha})`;
      ctx.fill();

      // Glow
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(43,123,255,${p.alpha * 0.1})`;
      ctx.fill();

      // Move
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    });

    requestAnimationFrame(draw);
  }
  draw();
}
